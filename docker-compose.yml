
services:
  backend:
    build:
      context: ./Backend
    container_name: devops-backend
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      # DB_* vars intentionally left unset locally; app runs without a DB.
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - app-net

  frontend:
    build:
      context: ./frontend
    container_name: devops-frontend
    ports:
      - "3000:8081"
    depends_on:
      - backend
    networks:
      - app-net

networks:
  app-net:
    driver: bridge
