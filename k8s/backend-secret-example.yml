# EXAMPLE ONLY - do not commit real credentials.
#
# In production this Secret is NOT created by hand or applied from Git.
# It is created one of two ways:
#
# 1) Synced automatically from AWS Secrets Manager using the External
#    Secrets Operator (recommended), e.g. an ExternalSecret resource that
#    creates a Kubernetes Secret named "backend-secret" from a Secrets
#    Manager entry such as "devops-assessment/db-credentials".
#
# 2) Created manually/out-of-band for a quick demo:
#    kubectl create secret generic backend-secret \
#      --from-literal=DB_USER=appuser \
#      --from-literal=DB_PASSWORD=<value-from-secrets-manager>
#
# The YAML below shows the SHAPE of the secret only, with placeholder
# (non-real, already base64-looking) values, so reviewers know what keys
# the backend expects. Never put real base64 credentials in Git.
apiVersion: v1
kind: Secret
metadata:
  name: backend-secret
type: Opaque
data:
  DB_USER: PFJFUExBQ0VfV0lUSF9TRUNSRVRTX01BTkFHRVJfVkFMVUU+   # <REPLACE_WITH_SECRETS_MANAGER_VALUE>
  DB_PASSWORD: PFJFUExBQ0VfV0lUSF9TRUNSRVRTX01BTkFHRVJfVkFMVUU+   # <REPLACE_WITH_SECRETS_MANAGER_VALUE>
